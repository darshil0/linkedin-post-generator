<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostGenius | LinkedIn Post Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">🌓</button>
            </div>
            <h1>PostGenius</h1>
            <p class="tagline">LinkedIn Post Architect</p>
        </header>

        <div class="app-layout">
            <section class="generator-section">
                <div class="card">
                    <h2>Post Generator</h2>
                    <p class="subtitle">Draft high-performing LinkedIn content in seconds.</p>

                    <div class="input-group">
                        <div class="label-row">
                            <label for="post-idea">What's the core idea of your post?</label>
                            <div class="counter-wrap">
                                <span id="char-counter" class="char-counter">0 / 3000</span>
                                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                            </div>
                        </div>
                        <textarea id="post-idea" aria-label="Core idea for your LinkedIn post" placeholder="e.g., The importance of emotional intelligence in leadership..."></textarea>
                    </div>

                    <div class="control-row">
                        <div class="input-group">
                            <label for="post-type">Post Type</label>
                            <select id="post-type">
                                <option value="thought_leadership">Thought Leadership</option>
                                <option value="story">Personal Story</option>
                                <option value="lesson">Lesson Learned</option>
                                <option value="educational">Educational</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="length">Target Length</label>
                            <select id="length">
                                <option value="short">Short (Punchy)</option>
                                <option value="medium" selected>Medium (Standard)</option>
                                <option value="long">Long (Deep Dive)</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-row">
                        <div class="input-group">
                            <label for="audience">Target Audience (Optional)</label>
                            <input type="text" id="audience" placeholder="e.g., Tech Founders">
                        </div>
                        <div class="input-group">
                            <label for="cta">Custom CTA (Optional)</label>
                            <input type="text" id="cta" placeholder="e.g., What do you think?">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Post Tone</label>
                        <div class="radio-group">
                            <input type="radio" id="tone-professional" name="tone" value="professional" checked>
                            <label for="tone-professional">Professional</label>

                            <input type="radio" id="tone-casual" name="tone" value="casual">
                            <label for="tone-casual">Casual</label>
                        </div>
                    </div>

                    <div class="input-group checkbox-control">
                        <input type="checkbox" id="include-hashtags" checked>
                        <label for="include-hashtags">Include optimized hashtags</label>
                    </div>

                    <div class="button-group">
                        <button id="generate-btn" aria-label="Generate post drafts">Generate Drafts</button>
                        <button id="clear-btn" class="secondary-btn" aria-label="Clear all inputs">Clear</button>
                    </div>
                </div>

                <div id="post-output" aria-live="polite">
                    <!-- Generated posts will appear here -->
                </div>
            </section>

            <section class="library-section">
                <div class="card">
                    <h2>Architecture Library</h2>
                    <p class="subtitle">Your saved post blueprints.</p>
                    <div class="search-wrap">
                        <input type="text" id="library-search" placeholder="Search saved drafts...">
                    </div>
                    <div id="library-list">
                        <!-- Saved items will appear here -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="src/script.js" type="module"></script>
</body>
</html>
